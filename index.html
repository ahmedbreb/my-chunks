<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chunk Trainer Pro</title>
    <style>
        :root { --bg: #f9fafb; --surface: #ffffff; --text: #111827; --muted: #6b7280; --accent: #3b82f6; --border: #e5e7eb; }
        [data-theme="dark"] { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8; --border: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; overflow: hidden; }
        .setup-area { max-width: 500px; margin: 0 auto; padding: 20px; overflow-y: auto; height: 100vh; }
        .hidden { display: none !important; }
        label { display: block; margin-top: 12px; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.95rem; }
        .auto-box { border: 2px dashed var(--accent); padding: 15px; border-radius: 12px; background: rgba(59, 130, 246, 0.05); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }
        .trainer { position: fixed; top: 0; left: 0; right: 0; bottom: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; z-index: 1; }
        .row-pinyin, .row-target, .row-trans { display: flex; flex-wrap: wrap; justify-content: center; align-items: center; width: 100%; }
        .row-pinyin { font-size: 1.1rem; color: var(--muted); margin-bottom: 10px; min-height: 1.5em; pointer-events: none; }
        .row-target { font-size: 2.4rem; font-weight: bold; margin-bottom: 20px; line-height: 1.2; }
        .row-trans { font-size: 1.2rem; color: var(--muted); font-style: italic; pointer-events: none; }
        .chunk { display: inline-flex; margin: 4px; padding-bottom: 2px; border-bottom: 2px solid transparent; }
        .row-target .chunk { user-select: text !important; -webkit-user-select: text !important; }
        .chunk.unrevealed { color: transparent !important; border-bottom-color: var(--border); user-select: none !important; -webkit-user-select: none !important; pointer-events: none !important; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 100px; background: var(--bg); border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .nav-btns { display: flex; gap: 40px; margin-top: 5px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); font-size: 1.2rem; color: var(--text); display: flex; align-items: center; justify-content: center; }
        .tap-hint { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; font-weight: bold; }
    </style>
</head>
<body data-theme="light">

    <div id="setup" class="setup-area">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>Sentence Trainer</h2>
            <button onclick="toggleTheme()" class="circle-btn" style="width:35px; height:35px; font-size:0.9rem;">🌓</button>
        </div>
        <div class="auto-box">
            <label style="margin-top:0; color:var(--accent)">✨ Smart Paste</label>
            <textarea id="auto-input" rows="4" placeholder="Paste all 3 lines here..." oninput="handleAutoPaste()"></textarea>
        </div>
        <label>Characters</label><input type="text" id="in-target">
        <label>Pinyin</label><input type="text" id="in-pinyin">
        <label>Translation</label><input type="text" id="in-trans">
        <button class="btn" onclick="start()">Start Practice</button>
    </div>

    <div id="practice" class="trainer hidden">
        <div id="display-pinyin" class="row-pinyin"></div>
        <div id="display-target" class="row-target"></div>
        <div id="display-trans" class="row-trans"></div>
    </div>

    <div id="controls" class="bottom-bar hidden">
        <div class="tap-hint">TAP SCREEN TO REVEAL</div>
        <div class="nav-btns">
            <button class="circle-btn" onclick="location.reload()">✎</button>
            <button class="circle-btn" onclick="toggleTheme()">🌓</button>
        </div>
    </div>

    <script>
        let currentStep = 0; 
        let totalSteps = 0;
        let pressTimer; 
        let isLongPress = false;
        let lastClickTime = 0;
        let canReveal = false;

        function handleAutoPaste() {
            const lines = document.getElementById('auto-input').value.split('\n').filter(l => l.trim() !== '');
            if (lines.length >= 1) document.getElementById('in-target').value = lines[0];
            if (lines.length >= 2) document.getElementById('in-pinyin').value = lines[1];
            if (lines.length >= 3) document.getElementById('in-trans').value = lines[2];
        }

        function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('chunk-theme', t); }
        function toggleTheme() { setTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        const savedT = localStorage.getItem('chunk-theme');
        if (savedT) setTheme(savedT); else if (window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');

        function start() {
            const tRaw = document.getElementById('in-target').value;
            const pRaw = document.getElementById('in-pinyin').value;
            const trRaw = document.getElementById('in-trans').value;
            if (!tRaw) return alert("Enter a sentence!");

            // Split and filter out empty items caused by trailing pipes
            const tC = tRaw.split(/[|｜]/).map(s => s.trim()).filter(s => s.length > 0);
            const pC = pRaw.split(/[|｜]/).map(s => s.trim()).filter(s => s.length > 0);
            const trC = trRaw.split(/[|｜]/).map(s => s.trim()).filter(s => s.length > 0);
            
            totalSteps = tC.length;
            currentStep = 0; 
            canReveal = false; // Locked initially

            const tD = document.getElementById('display-target');
            const pD = document.getElementById('display-pinyin');
            const trD = document.getElementById('display-trans');
            tD.innerHTML = ''; pD.innerHTML = ''; trD.innerHTML = '';

            tC.forEach((text, i) => {
                const sT = document.createElement('span'); sT.className = 'chunk unrevealed'; sT.id = `t-${i}`; sT.innerText = text; tD.appendChild(sT);
                const sP = document.createElement('span'); sP.className = 'chunk unrevealed'; sP.id = `p-${i}`; sP.innerText = pC[i] || ''; pD.appendChild(sP);
                if (trC.length > 1) {
                    const sTR = document.createElement('span'); sTR.className = 'chunk unrevealed'; sTR.id = `tr-${i}`; sTR.innerText = trC[i] || ''; trD.appendChild(sTR);
                } else if (i === 0) { trD.innerText = trRaw; }
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('practice').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');

            // Safety delay: prevent the start click from triggering the first reveal
            setTimeout(() => { canReveal = true; }, 500);
        }

        // Global event listeners to handle taps strictly
        const trainer = document.getElementById('practice');

        function onInteractionStart(e) {
            isLongPress = false;
            pressTimer = setTimeout(() => { isLongPress = true; }, 350);
        }

        function onInteractionEnd(e) {
            clearTimeout(pressTimer);
            if (!canReveal) return;

            const now = Date.now();
            // Prevent double-fires (ghost clicks) within 300ms
            if (now - lastClickTime < 300) return;
            lastClickTime = now;

            const selection = window.getSelection().toString();
            if (!isLongPress && selection.length === 0) {
                reveal();
            }
        }

        // Listen for both touch and mouse, but handle carefully
        trainer.addEventListener('touchstart', onInteractionStart, {passive: true});
        trainer.addEventListener('touchend', (e) => { 
            onInteractionEnd(e); 
        });
        trainer.addEventListener('mousedown', onInteractionStart);
        trainer.addEventListener('mouseup', onInteractionEnd);

        function reveal() {
            if (currentStep < totalSteps) {
                document.getElementById(`t-${currentStep}`).classList.remove('unrevealed');
                if(document.getElementById(`p-${currentStep}`)) document.getElementById(`p-${currentStep}`).classList.remove('unrevealed');
                if(document.getElementById(`tr-${currentStep}`)) document.getElementById(`tr-${currentStep}`).classList.remove('unrevealed');
                currentStep++;
            } else {
                // Perfect Reset Loop
                currentStep = 0;
                document.querySelectorAll('.chunk').forEach(c => c.classList.add('unrevealed'));
            }
        }
    </script>
</body>
</html>
