<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chunk Trainer</title>
    <style>
        :root { --bg: #f9fafb; --surface: #ffffff; --text: #111827; --muted: #6b7280; --accent: #3b82f6; }
        [data-theme="dark"] { --bg: #111827; --surface: #1f2937; --text: #f9fafb; --muted: #9ca3af; --accent: #60a5fa; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; }
        
        .setup-area { max-width: 500px; margin: 0 auto; display: block; }
        .hidden { display: none !important; }

        input, textarea { 
            width: 100%; padding: 15px; margin: 10px 0; border-radius: 12px; 
            border: 1px solid #ccc; background: var(--surface); color: var(--text); font-size: 1rem;
        }

        .btn { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer;
        }

        /* Trainer UI */
        .trainer { height: 80vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .row-pinyin { font-size: 1.2rem; color: var(--muted); margin-bottom: 10px; min-height: 1.5em; }
        .row-target { font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; line-height: 1.4; }
        .row-trans { font-size: 1.3rem; color: var(--muted); font-style: italic; }

        .chunk { display: inline-block; margin: 0 5px; transition: 0.2s; }
        .chunk.unrevealed { color: transparent; border-bottom: 2px solid #ccc; }
        
        .nav-btns { position: fixed; bottom: 30px; left: 0; right: 0; display: flex; justify-content: center; gap: 20px; }
        .circle-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid #ccc; background: var(--surface); font-size: 1.5rem; color: var(--text); }
    </style>
</head>
<body>

    <div id="setup" class="setup-area">
        <h2 style="margin-bottom:20px;">Sentence Trainer</h2>
        <label>Chinese Sentence (Use | to split)</label>
        <textarea id="in-target" rows="3" placeholder="你是你，| 我是我..."></textarea>
        
        <label>Pinyin (Use | to split)</label>
        <textarea id="in-pinyin" rows="3" placeholder="Nǐ shì nǐ, | wǒ shì wǒ..."></textarea>

        <label>Translation (Optional)</label>
        <input type="text" id="in-trans" placeholder="You are you, I am me...">
        
        <button class="btn" onclick="start()">Start Practice</button>
        <button id="theme-toggle" class="btn" style="background:#6b7280; margin-top:10px;">Toggle Dark Mode</button>
    </div>

    <div id="practice" class="trainer hidden" onclick="reveal()">
        <div id="display-pinyin" class="row-pinyin"></div>
        <div id="display-target" class="row-target"></div>
        <div id="display-trans" class="row-trans"></div>
        <div style="margin-top:40px; font-size:0.8rem; color:var(--muted);">Tap to reveal next chunk</div>
    </div>

    <div id="controls" class="nav-btns hidden">
        <button class="circle-btn" onclick="location.reload()">✎</button>
    </div>

    <script>
        let currentStep = 0;
        let totalSteps = 0;

        function start() {
            const targetRaw = document.getElementById('in-target').value;
            const pinyinRaw = document.getElementById('in-pinyin').value;
            const trans = document.getElementById('in-trans').value;

            if (!targetRaw) return alert("Please enter a sentence!");

            // Split by either | or ｜
            const targetChunks = targetRaw.split(/[|｜]/).map(s => s.trim());
            const pinyinChunks = pinyinRaw.split(/[|｜]/).map(s => s.trim());
            totalSteps = targetChunks.length;

            const tDiv = document.getElementById('display-target');
            const pDiv = document.getElementById('display-pinyin');
            const trDiv = document.getElementById('display-trans');

            tDiv.innerHTML = ''; pDiv.innerHTML = '';
            trDiv.innerText = trans;

            targetChunks.forEach((text, i) => {
                const spanT = document.createElement('span');
                spanT.className = 'chunk unrevealed';
                spanT.id = `t-${i}`;
                spanT.innerText = text;
                tDiv.appendChild(spanT);

                if(pinyinChunks[i]) {
                    const spanP = document.createElement('span');
                    spanP.className = 'chunk unrevealed';
                    spanP.id = `p-${i}`;
                    spanP.innerText = pinyinChunks[i];
                    pDiv.appendChild(spanP);
                }
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('practice').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
        }

        function reveal() {
            if (currentStep < totalSteps) {
                document.getElementById(`t-${currentStep}`).classList.remove('unrevealed');
                const p = document.getElementById(`p-${currentStep}`);
                if(p) p.classList.remove('unrevealed');
                currentStep++;
            } else {
                // Reset
                currentStep = 0;
                for(let i=0; i<totalSteps; i++) {
                    document.getElementById(`t-${i}`).classList.add('unrevealed');
                    const p = document.getElementById(`p-${i}`);
                    if(p) p.classList.add('unrevealed');
                }
            }
        }

        document.getElementById('theme-toggle').onclick = () => {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        };
    </script>
</body>
</html>
