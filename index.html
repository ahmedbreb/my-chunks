<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chunk Trainer Pro</title>
    <style>
        :root { 
            --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8; --border: #334155; 
            --hl-chunk: rgba(56, 189, 248, 0.08); 
            --hl-manual: #fbbf24; /* Precision Highlight Color */
        }
        [data-theme="light"] { 
            --bg: #f9fafb; --surface: #ffffff; --text: #111827; --muted: #6b7280; --accent: #3b82f6; --border: #e5e7eb; 
            --hl-chunk: rgba(59, 130, 246, 0.05); 
            --hl-manual: #f59e0b;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); transition: 0.3s; min-height: 100vh; overflow: hidden; }
        
        .setup-area { max-width: 500px; margin: 0 auto; padding: 20px; overflow-y: auto; height: 100vh; }
        .hidden { display: none !important; }
        label { display: block; margin-top: 12px; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.95rem; }
        
        .auto-box { border: 2px dashed var(--accent); padding: 15px; border-radius: 12px; background: rgba(56, 189, 248, 0.05); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: #000; font-weight: bold; font-size: 1.1rem; margin-top: 15px; cursor: pointer; }
        .btn-clear { background: transparent; border: 1px solid var(--muted); color: var(--muted); margin-top: 10px; font-size: 0.9rem; padding: 10px; }
        
        .trainer { 
            position: fixed; top: 0; left: 0; right: 0; bottom: 110px;
            display: flex; flex-direction: column; align-items: center;
            padding: 40px 15px; z-index: 1; overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        #display-wrapper { display: flex; flex-wrap: wrap; justify-content: center; align-items: flex-end; gap: 24px 14px; width: 100%; max-width: 1000px; margin: auto 0; }
        
        .chunk-group { display: inline-flex; flex-direction: column; align-items: center; min-width: 45px; padding: 8px 4px; border-radius: 8px; transition: 0.2s; }
        
        /* Precision Elements */
        .char-unit, .pinyin-unit { display: inline-block; padding: 0 1px; border-radius: 3px; transition: 0.2s; }
        
        /* Manual Highlight Logic */
        .manual-hl { background-color: var(--hl-manual) !important; color: #000 !important; }

        .pinyin-box { font-size: 1.1rem; color: var(--muted); margin-bottom: 6px; pointer-events: none; user-select: none; text-align: center; height: 1.2em; }
        .char-box { font-size: 2.4rem; font-weight: bold; line-height: 1.1; text-align: center; border-bottom: 2px solid transparent; }
        
        /* State Toggles */
        .unrevealed { color: transparent !important; border-bottom-color: var(--border); user-select: none !important; pointer-events: none !important; }
        .unrevealed .manual-hl { background-color: transparent !important; } /* Hide highlight until revealed */

        .row-trans { margin-top: 40px; font-size: 1.2rem; color: var(--muted); font-style: italic; text-align: center; max-width: 90%; padding-bottom: 40px; }

        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 110px; background: var(--bg); border-top: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .nav-btns { display: flex; gap: 6px; margin-top: 8px; }
        .circle-btn { width: 40px; height: 40px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); font-size: 0.9rem; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* MARKING MODE ACTIVE */
        .marking-mode .unrevealed { color: var(--text) !important; border-bottom-color: var(--accent); opacity: 0.6; }
        .marking-mode .unrevealed .manual-hl { background-color: var(--hl-manual) !important; }
        .marking-mode .char-unit, .marking-mode .pinyin-unit { cursor: pointer; pointer-events: auto !important; border: 1px dashed var(--muted); }

        .pinyin-hidden .pinyin-box { visibility: hidden !important; }
        .ink-mode #display-wrapper, .ink-mode #display-trans { visibility: hidden !important; }
    </style>
</head>
<body data-theme="dark">

    <div id="setup" class="setup-area">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>Sentence Trainer</h2>
            <button onclick="toggleTheme()" class="circle-btn" style="width:35px; height:35px;">🌓</button>
        </div>
        <div class="auto-box">
            <textarea id="auto-input" rows="4" placeholder="Paste lines here..." oninput="handleAutoPaste()"></textarea>
        </div>
        <label>Characters</label><input type="text" id="in-target">
        <label>Pinyin</label><input type="text" id="in-pinyin">
        <label>Translation</label><input type="text" id="in-trans">
        <button class="btn" onclick="start()">Start Practice</button>
        <button class="btn btn-clear" onclick="clearAll()">Clear</button>
    </div>

    <div id="practice" class="trainer hidden">
        <div id="display-wrapper"></div>
        <div id="display-trans" class="row-trans"></div>
    </div>

    <div id="controls" class="bottom-bar hidden">
        <div class="nav-btns">
            <button class="circle-btn" onclick="toggleMarkingMode()" id="mark-btn" title="Mark Elements">🖍️</button>
            <button class="circle-btn" onclick="togglePinyin()" id="pinyin-btn">拼</button>
            <button class="circle-btn" onclick="toggleInkMode()" id="ink-btn">👁️</button>
            <button class="circle-btn" onclick="rewindOne()">←</button>
            <button class="circle-btn" onclick="resetSentence()">↺</button>
            <button class="circle-btn" onclick="goBack()">✎</button>
            <button class="circle-btn" onclick="toggleTheme()">🌓</button>
        </div>
    </div>

    <script>
        let currentStep = 0, totalSteps = 0, canReveal = false;
        let markingActive = false;

        function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('chunk-theme', t); }
        function toggleTheme() { setTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        setTheme(localStorage.getItem('chunk-theme') || 'dark');

        function togglePinyin() {
            const isH = document.body.classList.toggle('pinyin-hidden');
            document.getElementById('pinyin-btn').style.color = isH ? 'var(--muted)' : 'var(--accent)';
        }

        function toggleInkMode() {
            const isI = document.body.classList.toggle('ink-mode');
            document.getElementById('ink-btn').innerText = isI ? '🙈' : '👁️';
        }

        function toggleMarkingMode() {
            markingActive = !markingActive;
            document.body.classList.toggle('marking-mode');
            const btn = document.getElementById('mark-btn');
            btn.style.borderColor = markingActive ? 'var(--hl-manual)' : 'var(--border)';
            btn.style.backgroundColor = markingActive ? 'rgba(251, 191, 36, 0.2)' : 'var(--surface)';
        }

        function handleAutoPaste() {
            const lines = document.getElementById('auto-input').value.split('\n').filter(l => l.trim() !== '');
            if (lines.length >= 1) document.getElementById('in-target').value = lines[0];
            if (lines.length >= 2) document.getElementById('in-pinyin').value = lines[1];
            if (lines.length >= 3) document.getElementById('in-trans').value = lines[2];
        }

        function clearAll() { ['auto-input', 'in-target', 'in-pinyin', 'in-trans'].forEach(id => document.getElementById(id).value = ''); }

        function start() {
            const tRaw = document.getElementById('in-target').value;
            const pRaw = document.getElementById('in-pinyin').value;
            const trRaw = document.getElementById('in-trans').value;
            if (!tRaw) return;

            const splitRegex = /[|｜]/;
            const tC = tRaw.split(splitRegex).map(s => s.trim()).filter(s => s.length > 0);
            const pC = pRaw.split(splitRegex).map(s => s.trim()).filter(s => s.length > 0);
            const trC = trRaw.split(splitRegex).map(s => s.trim()).filter(s => s.length > 0);
            
            totalSteps = tC.length; currentStep = 0; canReveal = false;
            const wrapper = document.getElementById('display-wrapper');
            const transBox = document.getElementById('display-trans');
            wrapper.innerHTML = ''; transBox.innerHTML = '';

            tC.forEach((text, i) => {
                const group = document.createElement('div'); group.className = 'chunk-group';
                
                // PINYIN - Split by spaces to allow individual marking
                const pBox = document.createElement('div'); pBox.className = 'pinyin-box unrevealed'; pBox.id = `p-${i}`;
                (pC[i] || '').split(' ').forEach(syl => {
                    const s = document.createElement('span'); s.className = 'pinyin-unit'; s.innerText = syl + ' ';
                    s.onclick = (e) => { if(markingActive) { s.classList.toggle('manual-hl'); e.stopPropagation(); } };
                    pBox.appendChild(s);
                });

                // CHARACTERS - Split individually
                const cBox = document.createElement('div'); cBox.className = 'char-box unrevealed'; cBox.id = `t-${i}`;
                text.split('').forEach(char => {
                    const s = document.createElement('span'); s.className = 'char-unit'; s.innerText = char;
                    s.onclick = (e) => { if(markingActive) { s.classList.toggle('manual-hl'); e.stopPropagation(); } };
                    cBox.appendChild(s);
                });
                
                group.appendChild(pBox); group.appendChild(cBox); wrapper.appendChild(group);

                if (trC.length > 1) {
                    const sTR = document.createElement('span'); sTR.className = 'unrevealed'; sTR.id = `tr-${i}`; sTR.innerText = trC[i] + ' '; transBox.appendChild(sTR);
                } else if (i === 0) { transBox.innerText = trRaw; }
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('practice').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            setTimeout(() => { canReveal = true; }, 500);
        }

        function rewindOne() {
            if (currentStep > 0) {
                currentStep--;
                document.getElementById(`t-${currentStep}`).classList.add('unrevealed');
                document.getElementById(`p-${currentStep}`).classList.add('unrevealed');
                const tr = document.getElementById(`tr-${currentStep}`);
                if(tr) tr.classList.add('unrevealed');
            }
        }

        function resetSentence() {
            currentStep = 0;
            document.querySelectorAll('.pinyin-box, .char-box, #display-trans span').forEach(el => el.classList.add('unrevealed'));
        }

        function goBack() {
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('practice').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            markingActive = false; document.body.classList.remove('marking-mode', 'ink-mode');
        }

        const trainer = document.getElementById('practice');
        trainer.onclick = () => {
            if (!canReveal || markingActive || document.body.classList.contains('ink-mode')) return;
            if (currentStep < totalSteps) {
                const charEl = document.getElementById(`t-${currentStep}`);
                charEl.classList.remove('unrevealed');
                document.getElementById(`p-${currentStep}`).classList.remove('unrevealed');
                const tr = document.getElementById(`tr-${currentStep}`);
                if(tr) tr.classList.remove('unrevealed');
                charEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                currentStep++;
            } else { resetSentence(); }
        };
    </script>
</body>
</html>
