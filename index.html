<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chunk Trainer Pro</title>
    <style>
        :root { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8; --border: #334155; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        .hidden { display: none !important; }
        
        .setup-area { max-width: 500px; margin: 0 auto; padding: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); font-weight: bold; cursor: pointer; margin-top: 10px; }

        .trainer { position: fixed; top: 0; left: 0; right: 0; bottom: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
        #word-display { font-size: 3.5rem; font-weight: bold; text-align: center; }
        
        /* Reference Panel */
        #ref-panel { position: fixed; bottom: 110px; left: 10px; right: 10px; background: var(--surface); padding: 15px; border-radius: 12px; border: 1px solid var(--border); font-size: 0.9rem; z-index: 10; }
        
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 110px; background: var(--bg); border-top: 1px solid var(--border); display: flex; justify-content: center; align-items: center; gap: 10px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="setup" class="setup-area">
        <h2>Chunk Trainer</h2>
        <label>Characters (Use spaces to separate words)</label>
        <textarea id="in-target" rows="2">我 本来 打算 今天 去洗。</textarea>
        <label>Full Pinyin</label><input type="text" id="in-pinyin" value="wǒ běnlái dǎsuàn jīntiān qùxǐ.">
        <label>Full Translation</label><input type="text" id="in-trans" value="I originally planned to go wash today.">
        <button class="btn" onclick="startWordMode()">Start Word-by-Word</button>
    </div>

    <div id="practice" class="trainer hidden" onclick="nextWord()">
        <div id="word-display"></div>
    </div>

    <div id="ref-panel" class="hidden">
        <div style="color: var(--accent); font-weight: bold; margin-bottom: 5px;">Reference</div>
        <div id="ref-pinyin"></div>
        <div id="ref-trans" style="margin-top: 5px;"></div>
    </div>

    <div id="controls" class="bottom-bar hidden">
        <button class="circle-btn" onclick="toggleRef()">?</button>
        <button class="circle-btn" onclick="goBack()">✎</button>
        <button class="circle-btn" onclick="reset()">↺</button>
    </div>

    <script>
        let words = [];
        let index = 0;

        function startWordMode() {
            const raw = document.getElementById('in-target').value;
            words = raw.split(/\s+/).filter(w => w.length > 0);
            document.getElementById('ref-pinyin').innerText = document.getElementById('in-pinyin').value;
            document.getElementById('ref-trans').innerText = document.getElementById('in-trans').value;
            
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('practice').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
            index = 0;
            showWord();
        }

        function nextWord() {
            index = (index + 1) % words.length;
            showWord();
        }

        function showWord() {
            document.getElementById('word-display').innerText = words[index];
        }

        function toggleRef() { document.getElementById('ref-panel').classList.toggle('hidden'); }
        
        function reset() { index = 0; showWord(); }

        function goBack() {
            document.getElementById('practice').classList.add('hidden');
            document.getElementById('controls').classList.add('hidden');
            document.getElementById('ref-panel').classList.add('hidden');
            document.getElementById('setup').classList.remove('hidden');
        }
    </script>
</body>
</html>
