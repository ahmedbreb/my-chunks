<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chunk Trainer</title>
    <style>
        :root { --bg: #f9fafb; --surface: #ffffff; --text: #111827; --muted: #6b7280; --accent: #3b82f6; --border: #e5e7eb; }
        [data-theme="dark"] { --bg: #0f172a; --surface: #1e293b; --text: #f1f5f9; --muted: #94a3b8; --accent: #38bdf8; --border: #334155; }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 20px; transition: 0.3s; min-height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .setup-area { max-width: 500px; margin: 0 auto; }
        .hidden { display: none !important; }
        label { display: block; margin-top: 12px; font-size: 0.85rem; font-weight: 600; color: var(--muted); }
        input, textarea { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 0.95rem; }
        .auto-box { border: 2px dashed var(--accent); padding: 15px; border-radius: 12px; background: rgba(59, 130, 246, 0.05); margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--accent); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; margin-top: 15px; }
        
        .trainer { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Disable selection on Pinyin and English to prevent annoying popups */
        .row-pinyin, .row-trans { user-select: none; -webkit-user-select: none; pointer-events: none; }
        
        .row-pinyin { font-size: 1.1rem; color: var(--muted); margin-bottom: 8px; min-height: 1.5em; }
        .row-target { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; line-height: 1.4; }
        .row-trans { font-size: 1.2rem; color: var(--muted); min-height: 1.5em; line-height: 1.4; }
        
        /* Revealable chunks */
        .chunk { display: inline-block; margin: 0 4px; transition: color 0.2s; border-bottom: 2px solid transparent; }
        
        /* Target characters ARE selectable once revealed */
        .row-target .chunk { user-select: text; -webkit-user-select: text; }

        .chunk.unrevealed { 
            color: transparent !important; 
            border-bottom-color: var(--border);
            user-select: none !important;
            -webkit-user-select: none !important;
            pointer-events: none;
        }

        .nav-btns { position: fixed; bottom: 40px; left: 0; right: 0; display: flex; justify-content: center; gap: 30px; }
        .circle-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border); background: var(--surface); font-size: 1.3rem; color: var(--text); display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body data-theme="light">

    <div id="setup" class="setup-area">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2>Sentence Trainer</h2>
            <button onclick="toggleTheme()" class="circle-btn" style="width:35px; height:35px; font-size:0.9rem;">🌓</button>
        </div>
        <div class="auto-box">
            <label style="margin-top:0; color:var(--accent)">✨ Smart Paste</label>
            <textarea id="auto-input" rows="4" placeholder="Paste all 3 lines here..." oninput="handleAutoPaste()"></textarea>
        </div>
        <label>Characters</label>
        <input type="text" id="in-target" placeholder="Characters | here">
        <label>Pinyin</label>
        <input type="text" id="in-pinyin" placeholder="Pinyin | here">
        <label>Translation</label>
        <input type="text" id="in-trans" placeholder="English | here">
        <button class="btn" onclick="start()">Start Practice</button>
    </div>

    <div id="practice" class="trainer hidden" 
         onmousedown="pressStart(event)" onmouseup="pressEnd(event)"
         ontouchstart="pressStart(event)" ontouchend="pressEnd(event)">
        <div id="display-pinyin" class="row-pinyin"></div>
        <div id="display-target" class="row-target"></div>
        <div id="display-trans" class="row-trans"></div>
        <div style="margin-top:40px; font-size:0.8rem; color:var(--muted); user-select:none;">Tap to reveal | Long-press char to copy</div>
    </div>

    <div id="controls" class="nav-btns hidden">
        <button class="circle-btn" onclick="location.reload()">✎</button>
        <button class="circle-btn" onclick="toggleTheme()">🌓</button>
    </div>

    <script>
        let currentStep = 0; let totalSteps = 0;
        let pressTimer;
        let isLongPress = false;

        function handleAutoPaste() {
            const lines = document.getElementById('auto-input').value.split('\n').filter(l => l.trim() !== '');
            if (lines.length >= 1) document.getElementById('in-target').value = lines[0];
            if (lines.length >= 2) document.getElementById('in-pinyin').value = lines[1];
            if (lines.length >= 3) document.getElementById('in-trans').value = lines[2];
        }

        function setTheme(t) { document.body.setAttribute('data-theme', t); localStorage.setItem('chunk-theme', t); }
        function toggleTheme() { setTheme(document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
        
        function start() {
            const tRaw = document.getElementById('in-target').value;
            const pRaw = document.getElementById('in-pinyin').value;
            const trRaw = document.getElementById('in-trans').value;
            if (!tRaw) return alert("Enter a sentence!");

            const tC = tRaw.split(/[|｜]/).map(s => s.trim());
            const pC = pRaw.split(/[|｜]/).map(s => s.trim());
            const trC = trRaw.split(/[|｜]/).map(s => s.trim());
            totalSteps = tC.length;

            const tD = document.getElementById('display-target');
            const pD = document.getElementById('display-pinyin');
            const trD = document.getElementById('display-trans');
            tD.innerHTML = ''; pD.innerHTML = ''; trD.innerHTML = '';

            tC.forEach((text, i) => {
                const sT = document.createElement('span'); sT.className = 'chunk unrevealed'; sT.id = `t-${i}`; sT.innerText = text; tD.appendChild(sT);
                const sP = document.createElement('span'); sP.className = 'chunk unrevealed'; sP.id = `p-${i}`; sP.innerText = pC[i] || ''; pD.appendChild(sP);
                if (trC.length > 1) {
                    const sTR = document.createElement('span'); sTR.className = 'chunk unrevealed'; sTR.id = `tr-${i}`; sTR.innerText = trC[i] || ''; trD.appendChild(sTR);
                } else if (i === 0) { trD.innerText = trRaw; }
            });

            document.getElementById('setup').classList.add('hidden');
            document.getElementById('practice').classList.remove('hidden');
            document.getElementById('controls').classList.remove('hidden');
        }

        function pressStart(e) {
            isLongPress = false;
            pressTimer = setTimeout(() => {
                isLongPress = true; // It's a long press!
            }, 400); 
        }

        function pressEnd(e) {
            clearTimeout(pressTimer);
            // Only reveal if it was a quick tap AND they aren't selecting text
            const selection = window.getSelection().toString();
            if (!isLongPress && selection.length === 0) {
                reveal();
            }
        }

        function reveal() {
            if (currentStep < totalSteps) {
                document.getElementById(`t-${currentStep}`).classList.remove('unrevealed');
                if(document.getElementById(`p-${currentStep}`)) document.getElementById(`p-${currentStep}`).classList.remove('unrevealed');
                if(document.getElementById(`tr-${currentStep}`)) document.getElementById(`tr-${currentStep}`).classList.remove('unrevealed');
                currentStep++;
            } else {
                currentStep = 0;
                for(let i=0; i<totalSteps; i++) {
                    document.getElementById(`t-${i}`).classList.add('unrevealed');
                    if(document.getElementById(`p-${i}`)) document.getElementById(`p-${i}`).classList.add('unrevealed');
                    if(document.getElementById(`tr-${i}`)) document.getElementById(`tr-${i}`).classList.add('unrevealed');
                }
            }
        }
    </script>
</body>
</html>
